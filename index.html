<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GPU / CPU Benchmark</title>

<style>
    body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        overflow: hidden;
    }

    #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
    }

    h1 {
        font-weight: 600;
        font-size: 18px;
        letter-spacing: 1px;
        opacity: 0.9;
    }

    #fps {
        margin-top: 10px;
        font-size: 14px;
        opacity: 0.8;
    }

    #hint {
        margin-top: 6px;
        font-size: 12px;
        opacity: 0.5;
    }
</style>
</head>

<body>

<div id="ui">
    <h1>GPU / CPU Benchmark</h1>
    <div id="fps">FPS: ...</div>
    <div id="hint">WebGL stress test scene</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ======================
// CONFIG
// ======================
const CUBE_COUNT = 25000;

// ======================
// GLOBALS
// ======================
let scene, camera, renderer;
let cubes = [];

let fpsEl = document.getElementById("fps");

let lastTime = performance.now();
let frames = 0;
let fps = 0;

init();
animate();

function init() {

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        2000
    );

    camera.position.z = 120;

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    document.body.appendChild(renderer.domElement);

    // LIGHT SETUP
    const light = new THREE.DirectionalLight(0xffffff, 2.5);
    light.position.set(100, 150, 100);
    light.castShadow = true;
    scene.add(light);

    const ambient = new THREE.AmbientLight(0x111111);
    scene.add(ambient);

    // GEOMETRY
    const geometry = new THREE.BoxGeometry(2, 2, 2);

    const baseMaterial = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        roughness: 0.85,
        metalness: 0.05
    });

    // CREATE CUBES
    for (let i = 0; i < CUBE_COUNT; i++) {

        const material = baseMaterial.clone();

        // deutlich dunklerer Bereich
        const shade = 0.02 + Math.random() * 0.25;
        material.color.setRGB(shade, shade, shade);

        const cube = new THREE.Mesh(geometry, material);

        cube.position.x = (Math.random() - 0.5) * 200;
        cube.position.y = (Math.random() - 0.5) * 200;
        cube.position.z = (Math.random() - 0.5) * 200;

        cube.castShadow = true;
        cube.receiveShadow = true;

        scene.add(cube);
        cubes.push(cube);
    }

    window.addEventListener("resize", onResize);
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// ======================
// LOOP
// ======================
function animate() {
    requestAnimationFrame(animate);

    for (let i = 0; i < cubes.length; i++) {
        cubes[i].rotation.x += 0.002;
        cubes[i].rotation.y += 0.003;
    }

    camera.position.x = Math.sin(performance.now() * 0.0002) * 80;
    camera.lookAt(0, 0, 0);

    renderer.render(scene, camera);

    // FPS
    frames++;
    let now = performance.now();

    if (now - lastTime >= 1000) {
        fps = frames;
        frames = 0;
        lastTime = now;
        fpsEl.innerText = "FPS: " + fps;
    }
}

</script>

</body>
</html>
